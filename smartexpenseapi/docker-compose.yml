version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartexpense-db
    environment:
      POSTGRES_DB: smartexpense_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: smartexpense-app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      SMARTEXPENSE_JWT_SECRET: smartexpenseSecretKeyForInterviewPurposeOnly12345
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:
